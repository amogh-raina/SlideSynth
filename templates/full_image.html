<section class="slide-full-image" data-slide-number="{{ slide_number }}"
  style="
    background: {{ tokens.colors.background | default('#0f172a') }};
    color: #ffffff;
    padding: 0;
    height: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  ">

  <!-- Full-bleed image -->
  {% if image_path %}
  <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #0f172a;">
    <img src="{{ image_path }}" alt="{{ title }}"
      style="
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        display: block;
      ">
  </div>
  {% endif %}

  <!-- Title + caption overlay at bottom -->
  <div style="
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
    padding: 3rem 3rem 2rem 3rem;
    z-index: 1;
  ">
    {% if title %}
    <h2 style="
      font-family: '{{ tokens.fonts.heading | default('Inter') }}', sans-serif;
      font-size: {{ tokens.typography.h2_size | default('1.5rem') }};
      font-weight: 600;
      color: #ffffff;
      margin: 0 0 0.5rem 0;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    ">{{ title }}</h2>
    {% endif %}

    {% if bullets %}
    <p style="
      font-family: '{{ tokens.fonts.body | default('Inter') }}', sans-serif;
      font-size: {{ tokens.typography.body_size | default('0.95rem') }};
      color: rgba(255,255,255,0.85);
      margin: 0;
    ">{{ bullets | join(' · ') }}</p>
    {% endif %}
  </div>

  <aside class="notes">{{ speaker_notes | default('') }}</aside>
</section>
