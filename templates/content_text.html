<section class="slide-content-text" data-slide-number="{{ slide_number }}"
  style="
    background: {{ tokens.colors.background | default('#ffffff') }};
    color: {{ tokens.colors.text | default('#1f2937') }};
    padding: {{ tokens.spacing.slide_padding | default('60px') }};
    height: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  ">

  <!-- Slide heading -->
  <h2 style="
    font-family: '{{ tokens.fonts.heading | default('Inter') }}', sans-serif;
    font-size: {{ tokens.typography.h2_size | default('1.8rem') }};
    font-weight: 700;
    color: {{ tokens.colors.primary | default('#1e3a8a') }};
    margin-bottom: 1.5rem;
    flex-shrink: 0;
    max-height: 2.5em;
    border-bottom: 3px solid {{ tokens.colors.primary | default('#1e3a8a') }};
    padding-bottom: 0.5rem;
  ">{{ title | default('') }}</h2>

  <!-- Bullet list -->
  {% if bullets %}
  <ul style="
    list-style: none;
    padding: 0;
    margin: 0;
    flex: {% if custom_html %}0 0 auto{% else %}1{% endif %};
    display: flex;
    flex-direction: column;
    justify-content: {% if custom_html %}flex-start{% else %}center{% endif %};
    gap: {{ tokens.spacing.bullet_gap | default('0.7em') }};
  ">
    {% for bullet in bullets %}
    <li style="
      font-family: '{{ tokens.fonts.body | default('Inter') }}', sans-serif;
      font-size: {{ tokens.typography.bullet_size | default('1.05rem') }};
      color: {{ tokens.colors.text | default('#1f2937') }};
      padding-left: 1.5rem;
      position: relative;
      line-height: 1.5;
    ">
      <span style="
        position: absolute; left: 0; top: 0.4em;
        width: 8px; height: 8px;
        background: {{ tokens.colors.secondary | default('#3b82f6') }};
        border-radius: 50%;
        display: inline-block;
      "></span>
      {{ bullet }}
    </li>
    {% endfor %}
  </ul>
  {% endif %}

  <!-- Custom HTML block (metric cards, charts, callouts, etc.) -->
  {% if custom_html %}
  <div class="slide-custom-html" style="
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    max-height: 520px;
    {% if bullets %}margin-top: 1rem;{% endif %}
  ">
    {{ custom_html }}
  </div>
  {% endif %}

  <aside class="notes">{{ speaker_notes | default('') }}</aside>
</section>
